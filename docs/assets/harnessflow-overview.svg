<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">HarnessFlow overview</title>
  <desc id="desc">A compact overview showing HarnessFlow turning an idea into specs, design, tasks, gated TDD, reviews, gates, and closeout.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#172554"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1280" height="640" rx="36" fill="url(#bg)"/>
  <circle cx="1100" cy="80" r="180" fill="#38bdf8" opacity="0.14"/>
  <circle cx="130" cy="560" r="220" fill="#a78bfa" opacity="0.16"/>
  <text x="80" y="110" fill="#e0f2fe" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="700" letter-spacing="0.12em">HARNESSFLOW</text>
  <text x="80" y="170" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="58" font-weight="800">Structured engineering</text>
  <text x="80" y="230" fill="#c7d2fe" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="32" font-weight="500">for AI coding agents</text>

  <g transform="translate(80 310)" filter="url(#shadow)">
    <rect x="0" y="0" width="160" height="118" rx="24" fill="url(#card)" stroke="#93c5fd" stroke-opacity="0.32"/>
    <text x="80" y="48" text-anchor="middle" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="800">Idea</text>
    <text x="80" y="82" text-anchor="middle" fill="#bfdbfe" font-family="Inter, ui-sans-serif, system-ui" font-size="15">discovery</text>

    <path d="M175 59 L235 59" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>
    <path d="M226 47 L240 59 L226 71" fill="none" stroke="#93c5fd" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="260" y="0" width="160" height="118" rx="24" fill="url(#card)" stroke="#93c5fd" stroke-opacity="0.32"/>
    <text x="340" y="48" text-anchor="middle" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="800">Spec</text>
    <text x="340" y="82" text-anchor="middle" fill="#bfdbfe" font-family="Inter, ui-sans-serif, system-ui" font-size="15">acceptance</text>

    <path d="M435 59 L495 59" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>
    <path d="M486 47 L500 59 L486 71" fill="none" stroke="#93c5fd" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="520" y="0" width="160" height="118" rx="24" fill="url(#card)" stroke="#93c5fd" stroke-opacity="0.32"/>
    <text x="600" y="48" text-anchor="middle" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="800">Design</text>
    <text x="600" y="82" text-anchor="middle" fill="#bfdbfe" font-family="Inter, ui-sans-serif, system-ui" font-size="15">architecture</text>

    <path d="M695 59 L755 59" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>
    <path d="M746 47 L760 59 L746 71" fill="none" stroke="#93c5fd" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="780" y="0" width="160" height="118" rx="24" fill="url(#card)" stroke="#93c5fd" stroke-opacity="0.32"/>
    <text x="860" y="48" text-anchor="middle" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="800">Tasks</text>
    <text x="860" y="82" text-anchor="middle" fill="#bfdbfe" font-family="Inter, ui-sans-serif, system-ui" font-size="15">one active</text>

    <path d="M955 59 L1015 59" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>
    <path d="M1006 47 L1020 59 L1006 71" fill="none" stroke="#93c5fd" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="1040" y="0" width="160" height="118" rx="24" fill="url(#card)" stroke="#93c5fd" stroke-opacity="0.32"/>
    <text x="1120" y="48" text-anchor="middle" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="800">Closeout</text>
    <text x="1120" y="82" text-anchor="middle" fill="#bfdbfe" font-family="Inter, ui-sans-serif, system-ui" font-size="15">handoff</text>
  </g>

  <g transform="translate(178 505)">
    <rect x="0" y="0" width="924" height="72" rx="36" fill="#020617" opacity="0.34"/>
    <text x="462" y="45" text-anchor="middle" fill="#dbeafe" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="700">Spec-anchored SDD  +  Gated TDD  +  Evidence-based routing  +  Independent reviews</text>
  </g>
</svg>
